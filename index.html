<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Subscripciones</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2a1);
            color: #e6e6e6;
        }

        .container {
            max-width: 500px;
            margin: auto;
            padding: 20px;
            text-align: center;
        }

        .banner {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border: 2px solid #1e90ff;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        h1 {
            color: #1e90ff;
        }

        .plans {
            margin-bottom: 20px;
        }

        .plan {
            border: 1px solid #1e90ff;
            padding: 10px;
            margin: 10px 0;
            cursor: pointer;
            border-radius: 8px;
            background-color: #111827;
            transition: 0.3s;
        }

        .plan:hover {
            background-color: #1e293b;
            transform: scale(1.03);
        }

        /* 🔥 PLAN SELECCIONADO */
        .plan.active {
            background-color: #1e90ff;
            color: #000;
            font-weight: bold;
        }

        .benefits {
            margin: 15px 0;
            padding: 15px;
            border: 1px solid #1e90ff;
            border-radius: 8px;
            display: none;
            background-color: rgba(0,0,0,0.4);
            text-align: left;
        }

        form {
            background-color: #111827;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #1e90ff;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background-color: #1e293b;
            color: #fff;
        }

        button {
            width: 95%;
            padding: 12px;
            margin-top: 10px;
            background: linear-gradient(45deg, #1e90ff, #00bfff);
            border: none;
            border-radius: 5px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Subscripciones</h1>

    <img src="logo.jpeg" alt="Subscripcion" class="banner">

    <div class="plans">
        <div class="plan" onclick="selectPlan(this, 'basico')">Plan Basico - $20</div>
        <div class="plan" onclick="selectPlan(this, 'pro')">Plan Pro - $40</div>
        <div class="plan" onclick="selectPlan(this, 'premium')">Plan Premium - $60</div>
    </div>

    <div id="benefits" class="benefits"></div>

    <form id="donationForm">
        <input type="text" placeholder="Nombre" required>
        <input type="email" placeholder="Email" required>

        <select required>
            <option value="">Metodo de pago</option>
            <option>Tarjeta</option>
            <option>PayPal</option>
            <option>ATH Movil</option>
        </select>

        <button type="submit">Confirmar subscripcion</button>
    </form>
</div>

<script>
function selectPlan(element, plan) {
    // Quitar seleccion anterior
    const plans = document.querySelectorAll(".plan");
    plans.forEach(p => p.classList.remove("active"));

    // Activar el seleccionado
    element.classList.add("active");

    // Mostrar beneficios
    showBenefits(plan);
}

function showBenefits(plan) {
    const benefitsDiv = document.getElementById("benefits");
    let content = "";

    if (plan === "basico") {
        content = `
        <strong>Plan Basico: Conectividad Esencial</strong><br><br>
        <b>Clases:</b><br>
        - 2 sesiones grupales al mes (60 min c/u)<br>
        - Uso de correo, seguridad basica y redes sociales<br><br>

        <b>Asistencia tecnica:</b><br>
        - Soporte remoto ilimitado (chat o telefono)<br><br>

        <b>Visitas:</b><br>
        - No incluye (o 1 visita anual preventiva)<br><br>

        <b>Reparaciones:</b><br>
        - Diagnostico gratuito<br>
        - 10% de descuento en mano de obra
        `;
    } 
    else if (plan === "pro") {
        content = `
        <strong>Plan Pro: Usuario Digital Independiente</strong><br><br>
        <b>Clases:</b><br>
        - 4 sesiones al mes (opcion 1 a 1)<br>
        - Productividad, edicion de fotos/video, archivos<br><br>

        <b>Asistencia tecnica:</b><br>
        - Soporte prioritario (< 4 horas)<br><br>

        <b>Visitas:</b><br>
        - 1 visita trimestral (optimizacion y limpieza)<br><br>

        <b>Reparaciones:</b><br>
        - 2 reparaciones de software al ano incluidas<br>
        - 20% descuento en hardware
        `;
    } 
    else if (plan === "premium") {
        content = `
        <strong>Plan Premium: Tecnologia Total</strong><br><br>
        <b>Clases:</b><br>
        - Sesiones ilimitadas (hasta 8/mes)<br>
        - Curriculo personalizado<br><br>

        <b>Asistencia tecnica:</b><br>
        - Soporte 24/7 con acceso inmediato<br><br>

        <b>Visitas:</b><br>
        - 1 visita mensual (sincronizacion total)<br><br>

        <b>Reparaciones:</b><br>
        - Mano de obra gratuita<br>
        - Instalacion de equipos y perifericos
        `;
    }

    benefitsDiv.innerHTML = content;
    benefitsDiv.style.display = "block";
}

document.getElementById("donationForm").addEventListener("submit", function(e) {
    e.preventDefault();
    alert("Subscripcion confirmada (simulacion)");
    this.reset();
});
</script>

</body>
</html>
